name: Generate Activation File

on:
  workflow_dispatch:

jobs:
  generate-alf:
    name: Generate .alf Activation File
    runs-on: ubuntu-latest
    container:
      image: unityci/editor:ubuntu-2022.3.45f1-base-1.0.0
    steps:
      - name: Generate Manual Activation File
        run: |
          # Try to find Unity executable
          UNITY_PATH=""
          for path in \
            /opt/Unity/Editor/Unity \
            /opt/unity/Editor/Unity; do
            if [ -f "$path" ]; then
              UNITY_PATH="$path"
              break
            fi
          done

          if [ -z "$UNITY_PATH" ]; then
            echo "Unity executable not found at expected paths."
            echo "Searching for Unity..."
            find / -name "Unity" -type f -executable 2>/dev/null | head -5
            exit 1
          fi

          echo "Found Unity at: $UNITY_PATH"
          $UNITY_PATH \
            -batchmode \
            -nographics \
            -logFile /tmp/unity-activation.log \
            -createManualActivationFile \
            -quit

      - name: Show activation log
        run: cat /tmp/unity-activation.log

      - name: Upload Activation File
        uses: actions/upload-artifact@v4
        with:
          name: UnityActivationFile
          path: ./*.alf
          if-no-files-found: warn