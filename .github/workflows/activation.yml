name: Generate Activation File

on:
  workflow_dispatch:

jobs:
  generate-alf:
    name: Generate .alf Activation File
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Activate Unity Personal License
        uses: game-ci/unity-activate@v2
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: 2022.3.45f1

      - name: Generate Manual Activation File
        run: |
          # Find the Unity executable inside the Docker container
          # The activation action should have created a container with Unity
          echo "Unity activation completed. Finding .ulf file..."
          find / -name "*.ulf" -type f 2>/dev/null | head -5 || true
          find / -name "*.alf" -type f 2>/dev/null | head -5 || true
          ls -la ./*.ulf 2>/dev/null || echo "No .ulf files in workspace"
          ls -la ./*.alf 2>/dev/null || echo "No .alf files in workspace"

      - name: Upload License File
        uses: actions/upload-artifact@v4
        with:
          name: UnityLicenseFile
          path: ./*.ulf
          if-no-files-found: warn